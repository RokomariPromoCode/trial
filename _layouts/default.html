<!doctype html>
<html lang="bn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    {% include header.html %}
    <main id="main-content" class="container">
      {{ content }}
    </main>
    {% include footer.html %}

    <!-- Floating WhatsApp button -->
    <a id="wa-btn" class="whatsapp-btn" href="https://wa.me/8801XXXXXXXXX" target="_blank" rel="noopener" aria-label="WhatsApp">
      <i class="fab fa-whatsapp"></i>
    </a>

    <script>
      window.SITE_BASEURL = "{{ site.baseurl }}";
    </script>
    <script src="{{ '/assets/js/cards.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
